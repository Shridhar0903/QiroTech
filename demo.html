<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QiroTech UI - Large Left Content</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f5f4f0;
      /* प्रतिमेतील ऑफ-व्हाईट रंग */
      color: #1e2229;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 8%;
      /* पॅडिंग थोडे वाढवले आहे */
    }

    .main-content {
      max-width: 900px;
      /* मजकुराची रुंदी वाढवली आहे जेणेकरून मोठे अक्षरे व्यवस्थित बसतील */
      display: flex;
      flex-direction: column;
      gap: 36px;
      /* घटकांमधील अंतर वाढवले */
    }

    .main-heading {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 72px;
      /* हेडिंग मोठे केले (आधी 58px होते) */
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -1.5px;
      color: #1a1a1a;
    }

    .description {
      font-size: 22px;
      /* पॅराग्राफ मोठा केला (आधी 18px होते) */
      line-height: 1.65;
      color: #2c3038;
      font-weight: 400;
    }

    /* Let's Talk बटण (मजकूर मोठा केल्यामुळे बटण देखील थोडे मोठे केले आहे) */
    .btn-talk {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #2b6166 0%, #356f74 100%);
      color: white;
      padding: 18px 42px;
      /* बटणचे पॅडिंग वाढवले */
      border-radius: 50px;
      border: none;
      font-size: 14px;
      /* फॉन्ट किंचित मोठा केला */
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(43, 97, 102, 0.35);
      width: fit-content;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn-talk:hover {
      opacity: 0.95;
      transform: translateY(-2px);
    }

    .btn-talk svg {
      width: 16px;
      height: 16px;
    }

    /* मोबाईल स्क्रीनसाठी रिस्पॉन्सिव्ह सेटिंग्ज */
    @media (max-width: 768px) {
      body {
        padding: 40px 24px;
      }

      .main-heading {
        font-size: 46px;
        /* मोबाईलवर जास्त मोठे दिसू नये म्हणून बॅलन्स केले */
      }

      .description {
        font-size: 18px;
      }

      .btn-talk {
        padding: 15px 36px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="main-content">
    <h1 class="main-heading">
      Powerful digital solutions<br>for modern businesses.
    </h1>
    <p class="description">
      QiroTech is a creative technology company specializing in website design, web development, branding, and digital
      marketing. We build modern digital experiences that help businesses grow, connect, and stand out online.
    </p>
    <button class="btn-talk">
      Let's Talk
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"></path>
      </svg>
    </button>
  </div>

</body>

</html>
