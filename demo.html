<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QiroTech UI - Large Left Content</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    .footer-mdx-bottom {
      margin-top: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
    }

    .footer-mdx-socials {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .footer-mdx-socials a {
      display: flex;
      align-items: center;
      justify-content: center;

      width: 45px;
      height: 45px;

      color: #8f8f92;
      font-size: 30px;
      text-decoration: none;
      cursor: pointer;

      transition: color 0.3s ease, transform 0.3s ease;
    }

    .footer-mdx-socials a:hover {
      color: #ffffff;
      transform: translateY(-3px);
    }

    .footer-mdx-socials a:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <div class="footer-mdx-socials">

    <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
      <i class="fa-brands fa-facebook-f"></i>
    </a>

    <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>

    <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
      <i class="fa-brands fa-linkedin-in"></i>
    </a>

  </div>

</body>

</html>
